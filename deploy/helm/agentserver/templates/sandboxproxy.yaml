apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sandboxproxy
  labels:
    app: {{ .Release.Name }}-sandboxproxy
spec:
  replicas: {{ .Values.sandboxProxy.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-sandboxproxy
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-sandboxproxy
    spec:
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Release.Name }}-postgresql -p 5432 -U {{ .Values.postgresql.auth.username }}; do
                echo "Waiting for PostgreSQL to be ready..."
                sleep 2
              done
      {{- end }}
      containers:
        - name: sandboxproxy
          image: "{{ .Values.sandboxProxy.image.repository }}:{{ .Values.sandboxProxy.image.tag }}"
          imagePullPolicy: {{ .Values.sandboxProxy.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.sandboxProxy.port }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentserver.databaseSecretName" . }}
                  key: database-url
            - name: LISTEN_ADDR
              value: ":{{ .Values.sandboxProxy.port }}"
            - name: BASE_DOMAIN
              value: {{ .Values.sandbox.baseDomain | quote }}
            - name: OPENCODE_SUBDOMAIN_PREFIX
              value: {{ .Values.sandbox.opencode.subdomainPrefix | default "code" | quote }}
            - name: OPENCLAW_SUBDOMAIN_PREFIX
              value: {{ .Values.sandbox.openclaw.subdomainPrefix | default "claw" | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.sandboxProxy.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.sandboxProxy.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-sandboxproxy
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.sandboxProxy.port }}
      targetPort: {{ .Values.sandboxProxy.port }}
      protocol: TCP
  selector:
    app: {{ .Release.Name }}-sandboxproxy
